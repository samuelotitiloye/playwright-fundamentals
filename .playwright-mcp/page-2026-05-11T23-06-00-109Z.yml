                  - text: All the logged in information will be stored in the persistent profile, you can delete it between sessions if you'd like to clear the offline state. Persistent profile is located at the following locations and you can override it with the
                  - code [ref=e898]: "--user-data-dir"
                  - text: argument.
                - generic [ref=e899]:
                  - generic [ref=e900]:
                    - generic [ref=e901]: "# Windows"
                    - text: "%USERPROFILE%\\AppData\\Local\\ms-playwright\\mcp-{channel}-{workspace-hash}"
                    - generic [ref=e902]: "# macOS"
                    - text: "- ~/Library/Caches/ms-playwright/mcp-{channel}-{workspace-hash}"
                    - generic [ref=e903]: "# Linux"
                    - text: "- ~/.cache/ms-playwright/mcp-{channel}-{workspace-hash}"
                  - button "Copy code to clipboard" [ref=e905] [cursor=pointer]:
                    - img [ref=e906]
                - paragraph [ref=e909]:
                  - code [ref=e910]: "{workspace-hash}"
                  - text: is derived from the MCP client's workspace root, so different projects get separate profiles automatically.
                - generic [ref=e911]:
                  - paragraph [ref=e912]:
                    - img [ref=e913]
                    - text: Important
                  - paragraph [ref=e915]:
                    - text: A persistent profile can only be used by one browser instance at a time, so concurrent MCP clients sharing the same workspace will conflict. To run several clients in parallel, start each additional client with
                    - code [ref=e916]: "--isolated"
                    - text: or point it at a distinct
                    - code [ref=e917]: "--user-data-dir"
                    - text: .
                - paragraph [ref=e918]:
                  - strong [ref=e919]: Isolated
                - paragraph [ref=e920]:
                  - text: In the isolated mode, each session is started in the isolated profile. Every time you ask MCP to close the browser, the session is closed and all the storage state for this session is lost. You can provide initial storage state to the browser via the config's
                  - code [ref=e921]: contextOptions
                  - text: or via the
                  - code [ref=e922]: "--storage-state"
                  - text: argument. Learn more about the storage state
                  - link "here" [ref=e923] [cursor=pointer]:
                    - /url: https://playwright.dev/docs/auth
                  - text: .
                - generic [ref=e924]:
                  - generic [ref=e925]: "{ \"mcpServers\": { \"playwright\": { \"command\": \"npx\", \"args\": [ \"@playwright/mcp@latest\", \"--isolated\", \"--storage-state={path/to/storage.json}\" ] } } }"
                  - button "Copy code to clipboard" [ref=e927] [cursor=pointer]:
                    - img [ref=e928]
                - paragraph [ref=e931]:
                  - strong [ref=e932]: Browser Extension
                - paragraph [ref=e933]:
                  - text: The Playwright MCP Chrome Extension allows you to connect to existing browser tabs and leverage your logged-in sessions and browser state. See
                  - link "microsoft/playwright › packages/extension" [ref=e934] [cursor=pointer]:
                    - /url: https://github.com/microsoft/playwright/tree/main/packages/extension#readme
                  - text: for installation and setup instructions.
                - generic [ref=e935]:
                  - heading "Initial state" [level=3] [ref=e936]
                  - 'link "Permalink: Initial state" [ref=e937] [cursor=pointer]':
                    - /url: "#initial-state"
                    - img [ref=e938]
                - paragraph [ref=e940]: There are multiple ways to provide the initial state to the browser context or a page.
                - paragraph [ref=e941]: "For the storage state, you can either:"
                - list [ref=e942]:
                  - listitem [ref=e943]:
                    - text: Start with a user data directory using the
                    - code [ref=e944]: "--user-data-dir"
                    - text: argument. This will persist all browser data between the sessions.
                  - listitem [ref=e945]:
                    - text: Start with a storage state file using the
                    - code [ref=e946]: "--storage-state"
                    - text: argument. This will load cookies and local storage from the file into an isolated browser context.
                - paragraph [ref=e947]: "For the page state, you can use:"
                - list [ref=e948]:
                  - listitem [ref=e949]:
                    - code [ref=e950]: "--init-page"
                    - text: to point to a TypeScript file that will be evaluated on the Playwright page object. This allows you to run arbitrary code to set up the page.
                - generic [ref=e951]:
                  - generic [ref=e952]: "// init-page.ts export default async ({ page }) => { await page.context().grantPermissions(['geolocation']); await page.context().setGeolocation({ latitude: 37.7749, longitude: -122.4194 }); await page.setViewportSize({ width: 1280, height: 720 }); };"
                  - button "Copy code to clipboard" [ref=e954] [cursor=pointer]:
                    - img [ref=e955]
                - list [ref=e958]:
                  - listitem [ref=e959]:
                    - code [ref=e960]: "--init-script"
                    - text: to point to a JavaScript file that will be added as an initialization script. The script will be evaluated in every page before any of the page's scripts. This is useful for overriding browser APIs or setting up the environment.
